# BEGIN_KITTY_FONTS
font_family      family='Source Code Pro' variable_name=SourceCodePro style=SourceCodePro-Light
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS
update_check_interval 0
# font_family family='Fira Code' style=Light variable_name=FiraCode
# font_family family=Inconsolata style=Light variable_name=''
font_size 13.0
tab_bar_edge top
tab_bar_style separator
tab_separator " | "
disable_ligatures always
scrollback_lines 10000
select_by_word_characters @-./_~?&=%+#
open_url_with none
remember_window_size yes
hide_window_decorations yes
window_padding_width 0 8 8 8
close_on_child_death yes
window_border_width 1
active_border_color #e1ce66
inactive_border_color #444444
inactive_text_alpha 0.8

adjust_column_width 110%
modify_font cell_height 12px

action_alias launch_tab launch --type=tab --cwd=current

map shift+pgup scroll_page_up
map shift+pgdn scroll_page_down
map ctrl+pgup previous_tab
map ctrl+pgdn next_tab
map ctrl+up resize_window taller
map ctrl+down resize_window shorter
map ctrl+shift+k resize_window taller
map ctrl+shift+j resize_window shorter
map ctrl+alt+equal change_font_size all 0
map ctrl+alt+plus change_font_size all +1.0
map ctrl+alt+minus change_font_size all -1.0
map ctrl+alt+, load_config_file
# map ctrl+shift+t new_tab_with_cwd
map ctrl+shift+t launch --type tab --cwd home
map ctrl+shift+z scroll_to_prompt -1
map ctrl+u signal_child SIGKILL
map ctrl+alt+s kitten snip-menu.py

# map ctrl+alt+shift+g kitten kitten-git-push-upstream.py
map ctrl+alt+e kitten hints --customize-processing custom-hints.py --program @

background #1b1b1b

# black
color0 #1b1b1b
color8 #5E5C64

# red
color1 #C01C28
color9 #F66151

# green
color2 #26A269
color10 #33DA7A

# yellow
color3 #A2734C
color11 #E9AD0C

# blue
color4 #1e78ad
color12 #2A7BDE

# magenta
color5 #A347BA
color13 #C061CB

# cyan
color6 #2AA1B3
color14 #33C7DE

# white
color7 #a0a0a0
color15 #d0d0d0

# BEGIN_KITTY_OS_CONFIG
include kitty_${KITTY_OS}.conf
# END_KITTY_OS_CONFIG
